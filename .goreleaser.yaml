version: 2

builds:
  - main: ./cmd/worklog/main.go
    binary: worklog
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^ci:"

brews:
  - name: worklog
    repository:
      owner: jquiaios
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/jquiaios/worklog"
    description: "Fast CLI + TUI for logging work highlights and lowlights"
    license: "MIT"
    install: |
      bin.install "worklog"
    test: |
      system "#{bin}/worklog", "--help"
